<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between transition-colors duration-500">

    <header id="topbar" class="bg-slate-800 p-3 border-b-4 border-slate-700 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center relative">
                <div class="flex flex-col">
                    <h1 class="font-extrabold text-sm tracking-wider uppercase text-amber-400">Velha P2P</h1>
                    <div class="flex items-center space-x-1.5 text-[11px] text-slate-400 font-mono mt-0.5">
                        <span>Sala:<strong id="topbar-room-id" class="text-indigo-400">...</strong></span>
                        <button onclick="copyLink()" class="bg-slate-700 hover:bg-indigo-600 text-white px-2 py-0.5 rounded text-[10px] font-bold transition">📋 Compartilhar</button>
                    </div>
                </div>
                <button id="btn-leave" onclick="leaveRoom()" class="bg-slate-700 hover:bg-red-600 text-white text-[11px] font-bold py-1 px-2.5 rounded-lg transition shadow">➡️ Sair</button>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-3 w-full max-w-md mx-auto mb-12">
        
        <div id="screen-lobby" class="fixed inset-0 bg-slate-950/80 z-40 flex flex-col items-center justify-center p-6 text-center">
            <div class="bg-slate-900 border-2 border-slate-700 p-6 rounded-2xl max-w-sm w-full shadow-2xl space-y-4">
                <h2 class="text-xl font-extrabold mb-2">Aguardando Oponente</h2>
                <p class="text-slate-400 text-xs">Envie o link da sala para o outro jogador se conectar.</p>
                <div id="connection-status" class="text-amber-400 text-xs font-medium animate-pulse">Conectando ao servidor P2P...</div>
                <div id="loading-peer" class="hidden text-amber-400 text-xs font-medium animate-pulse">Configurando sala...</div>
            </div>
        </div>

        <div id="game-scoreboard" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-2xl flex items-center justify-between mb-4">
            <div class="text-center">
                <span class="text-red-400 font-black text-xs block">P1 (X Vermelho)</span>
                <div class="flex items-center space-x-1 mt-0.5 justify-center">
                    <span id="status-dot-p1" class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
                    <span id="status-text-p1" class="text-[10px] text-rose-400 font-bold font-mono">Offline</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <span id="score-red" class="bg-slate-950 px-2.5 py-1 rounded text-white font-mono text-sm font-bold">0</span>
                <span class="text-slate-500 font-black italic text-sm">VS</span>
                <span id="score-blue" class="bg-slate-950 px-2.5 py-1 rounded text-white font-mono text-sm font-bold">0</span>
            </div>
            <div class="text-center">
                <span class="text-blue-400 font-black text-xs block">P2 (O Azul)</span>
                <div class="flex items-center space-x-1 mt-0.5 justify-center">
                    <span id="status-text-p2" class="text-[10px] text-rose-400 font-bold font-mono">Offline</span>
                    <span id="status-dot-p2" class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
                </div>
            </div>
        </div>

        <div id="screen-game" class="w-full space-y-4">
            <div id="btn-turn" class="w-full text-center font-bold py-2.5 rounded-xl text-xs border border-slate-700 bg-slate-800 transition">Carregando...</div>

            <div id="board-grid" class="grid grid-cols-3 gap-3 bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-2xl aspect-square">
                </div>
        </div>

        <div id="game-over-screen" class="hidden fixed inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-center p-6 text-center">
            <div class="border-2 p-6 rounded-2xl max-w-sm w-full space-y-4 shadow-2xl" id="game-over-box">
                <h2 id="game-over-title" class="text-3xl font-black tracking-wide"></h2>
                <p id="game-over-msg" class="text-sm text-slate-300 font-medium"></p>
                <button id="btn-next-game" onclick="requestNewGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition text-sm">🔄 Próxima Partida</button>
                <p id="waiting-opponent-next" class="hidden text-amber-400 text-xs animate-pulse font-medium">Aguardando oponente...</p>
                <p id="opponent-requested-rematch" class="hidden text-amber-400 text-xs animate-pulse font-medium">Oponente solicitou revanche...</p>
            </div>
        </div>
    </main>

    <footer class="p-3 text-center text-[11px] text-slate-500 border-t border-slate-800 bg-slate-950 fixed bottom-0 left-0 right-0 z-30">⚡ Conexão P2P Direta</footer>

    <script>
        let peer = null, conn = null, myRole = '', isMyTurn = false;
        let score = { red: 0, blue: 0 };
        let localPlayerReadyForNext = false, opponentReadyForNext = false;
        
        let board = Array(9).fill(null);
        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Horizontais
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Verticais
            [0, 4, 8], [2, 4, 6]             // Diagonais
        ];

        const screenLobby = document.getElementById('screen-lobby');
        const topbar = document.getElementById('topbar');
        const gridContainer = document.getElementById('board-grid');
        const urlParams = new URLSearchParams(window.location.search);
        let roomCode = urlParams.get('room');

        if (!roomCode) {
            const generatedCode = 'VELHA-' + Math.random().toString(36).substring(2, 7).toUpperCase();
            localStorage.setItem('hosted_room_velha', generatedCode);
            window.location.href = window.location.origin + window.location.pathname + '?room=' + generatedCode;
        } else {
            document.getElementById('topbar-room-id').innerText = roomCode;
            myRole = (roomCode === localStorage.getItem('hosted_room_velha')) ? 'red' : 'blue';
            loadGameState();
            setupTheme();
            if (myRole === 'red') initHost(roomCode); else initGuest(roomCode);
        }

        function saveGameState() { if (roomCode) localStorage.setItem(`velha_score_${roomCode}`, JSON.stringify(score)); }
        function loadGameState() { const s = localStorage.getItem(`velha_score_${roomCode}`); if (s) score = JSON.parse(s); updateScoreboardVisual(); }
        function setupTheme() { topbar.className = myRole === 'red' ? "bg-red-950 p-3 border-b-4 border-red-700 shadow-md sticky top-0 z-50 text-white" : "bg-blue-950 p-3 border-b-4 border-blue-700 shadow-md sticky top-0 z-50 text-white"; }
        function updateScoreboardVisual() { document.getElementById('score-red').innerText = score.red; document.getElementById('score-blue').innerText = score.blue; }

        function updatePresenceUI(p1, p2) {
            const apply = (dot, txt, on) => {
                document.getElementById(dot).className = on ? "w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" : "w-1.5 h-1.5 rounded-full bg-rose-500";
                document.getElementById(txt).innerText = on ? "Online" : "Offline";
                document.getElementById(txt).className = on ? "text-green-400 font-bold font-mono text-[10px]" : "text-rose-400 font-bold font-mono text-[10px]";
            };
            apply('status-dot-p1', 'status-text-p1', p1);
            apply('status-dot-p2', 'status-text-p2', p2);
        }

        function initHost(code) {
            document.getElementById('loading-peer').classList.remove('hidden');
            updatePresenceUI(true, false);
            peer = new Peer(code);
            peer.on('open', () => { document.getElementById('loading-peer').classList.add('hidden'); document.getElementById('connection-status').innerText = "Aguardando Jogador 2..."; });
            peer.on('connection', c => { conn = c; handleEvents(); });
        }

        function initGuest(code) {
            updatePresenceUI(false, true);
            peer = new Peer();
            peer.on('open', () => { document.getElementById('connection-status').innerText = "Conectando ao Jogador 1..."; conn = peer.connect(code); handleEvents(); });
        }

        function handleEvents() {
            const cur = conn;
            const onOpen = () => { if (conn !== cur) return; updatePresenceUI(true, true); screenLobby.classList.add('hidden'); resetBoardState(); };
            if (cur.open) onOpen(); else cur.on('open', onOpen);

            cur.on('data', data => {
                if (conn !== cur) return;
                if (data.type === 'MOVE') { applyMove(data.index, data.role); isMyTurn = true; updateTurnUI(); }
                else if (data.type === 'NEXT_GAME_READY') { opponentReadyForNext = true; document.getElementById('opponent-requested-rematch').classList.remove('hidden'); checkNextGameTransition(); }
            });

            cur.on('close', () => {
                if (conn !== cur) return;
                updatePresenceUI(myRole === 'red', myRole === 'blue');
                document.getElementById('btn-turn').innerText = "⏳ OPONENTE DESCONECTADO...";
                document.getElementById('btn-turn').className = "w-full bg-slate-800 text-rose-400 font-bold py-2.5 rounded-xl text-xs border border-rose-900/50 text-center";
            });
        }

        function resetBoardState() {
            board.fill(null);
            localPlayerReadyForNext = false; opponentReadyForNext = false;
            isMyTurn = ((score.red + score.blue) % 2 === 0) ? (myRole === 'red') : (myRole === 'blue');

            gridContainer.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('button');
                cell.id = `cell-${i}`;
                cell.onclick = () => selectCell(i);
                cell.className = "bg-slate-800 border border-slate-700 rounded-2xl flex items-center justify-center text-4xl font-black transition duration-200 aspect-square hover:bg-slate-700/50 active:scale-95";
                gridContainer.appendChild(cell);
            }
            document.getElementById('game-over-screen').classList.add('hidden');
            updateTurnUI();
        }

        function updateTurnUI() {
            const b = document.getElementById('btn-turn');
            if (isMyTurn) {
                b.className = "w-full bg-emerald-600 text-white font-black py-2.5 rounded-xl text-xs shadow-lg animate-pulse text-center";
                b.innerText = "🟢 SUA VEZ! Clique em um quadrante vazio";
            } else {
                b.className = "w-full bg-slate-800 text-slate-500 font-bold py-2.5 rounded-xl text-xs border border-slate-700/50 text-center";
                b.innerText = "⏳ VEZ DO OPONENTE...";
            }
        }

        function selectCell(index) {
            if (!isMyTurn || board[index] !== null) return;
            applyMove(index, myRole);
            isMyTurn = false;
            updateTurnUI();
            if (conn && conn.open) conn.send({ type: 'MOVE', index: index, role: myRole });
        }

        function applyMove(index, role) {
            board[index] = role;
            const cell = document.getElementById(`cell-${index}`);
            cell.disabled = true;
            if (role === 'red') {
                cell.innerText = 'X';
                cell.className = "bg-red-950/40 border-2 border-red-500 text-red-500 rounded-2xl flex items-center justify-center text-4xl font-black aspect-square scale-95 transition-all duration-200 shadow-lg shadow-red-500/10";
            } else {
                cell.innerText = 'O';
                cell.className = "bg-blue-950/40 border-2 border-blue-500 text-blue-500 rounded-2xl flex items-center justify-center text-4xl font-black aspect-square scale-95 transition-all duration-200 shadow-lg shadow-blue-500/10";
            }
            checkWinCondition();
        }

        function checkWinCondition() {
            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return triggerGameOver(board[a]);
                }
            }
            if (!board.includes(null)) triggerGameOver('draw');
        }

        function triggerGameOver(winner) {
            const box = document.getElementById('game-over-box');
            const title = document.getElementById('game-over-title');
            const msg = document.getElementById('game-over-msg');
            box.className = `${myRole === 'red' ? 'bg-red-950' : 'bg-blue-950'} border-2 p-6 rounded-2xl max-w-sm w-full space-y-4 shadow-2xl ` + (winner === 'draw' ? 'border-amber-500' : (winner === myRole ? 'border-green-500' : 'border-red-500'));

            if (winner === 'draw') {
                title.innerText = "🤝 EMPATE!"; title.className = "text-2xl font-black text-amber-400"; msg.innerText = "Velha! Ninguém conseguiu alinhar três.";
            } else {
                if (!localPlayerReadyForNext && !opponentReadyForNext) {
                    if (winner === 'red') score.red++; else score.blue++;
                    updateScoreboardVisual(); saveGameState();
                }
                if (winner === myRole) {
                    title.innerText = "🏆 VITÓRIA!"; title.className = "text-3xl font-black text-green-400 animate-bounce"; msg.innerText = "Você fechou uma linha primeiro!";
                } else {
                    title.innerText = "💀 DERROTA"; title.className = "text-3xl font-black text-red-500"; msg.innerText = "O oponente fechou a trinca antes.";
                }
            }
            document.getElementById('btn-next-game').className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition text-sm cursor-pointer";
            document.getElementById('btn-next-game').disabled = false;
            document.getElementById('waiting-opponent-next').classList.add('hidden');
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function requestNewGame() {
            localPlayerReadyForNext = true;
            if (conn && conn.open) conn.send({ type: 'NEXT_GAME_READY' });
            const btn = document.getElementById('btn-next-game');
            btn.disabled = true; btn.className = "w-full bg-slate-800 text-slate-500 font-bold py-3 rounded-xl text-sm cursor-not-allowed";
            document.getElementById('waiting-opponent-next').classList.remove('hidden');
            checkNextGameTransition();
        }

        function checkNextGameTransition() { if (localPlayerReadyForNext && opponentReadyForNext) resetBoardState(); }
        function copyLink() { navigator.clipboard.writeText(window.location.origin + window.location.pathname + '?room=' + roomCode).then(() => alert('Link copiado!')); }
        function leaveRoom() { if (roomCode) localStorage.removeItem(`velha_score_${roomCode}`); localStorage.removeItem('hosted_room_velha'); if (conn) conn.close(); if (peer) peer.destroy(); window.location.href = window.location.origin + window.location.pathname; }
    </script>
</body>
</html>
