<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360, initial-scale=1, maximum-scale=5, user-scalable=1" />
  <title>Jogos da Galera</title>

  <link rel="icon"     type="image/png" href="https://jogosdagalera.pages.dev/logowpp.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color"       content="#f1c40f">
  <meta property="og:title"       content="Jogos da Galera">
  <meta property="og:description" content="Seus jogos favoritos">
  <meta property="og:image"       content="https://jogosdagalera.pages.dev/logowpp.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:      #f1c40f;
      --yellow-dark: #f39c12;
      --bg-dark:     #121214;
      --card-bg:     #1a1a1e;
      --text-white:  #ffffff;
      --text-gray:   #a0a0a5;
      --border-color:#29292e;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 25px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .logo-img {
      width: 45px;
      height: 45px;
      border-radius: 10px;
      object-fit: cover;
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      color: var(--yellow);
      letter-spacing: 0.5px;
    }

    /* Info da Sala */
    .room-info {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .room-info strong {
      color: var(--yellow);
      font-size: 16px;
    }
    #room-status {
      color: var(--text-gray);
      font-weight: 600;
    }
    .btn-exit {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }

    /* Grid de Jogos */
    .games-grid {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 12px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .game-card:active {
      transform: scale(0.98);
    }

    .game-thumb {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
      margin-right: 16px;
      background: #29292e;
    }

    .game-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .game-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-white);
    }

    .game-desc {
      font-size: 13px;
      color: var(--text-gray);
      font-weight: 600;
      line-height: 1.4;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="https://jogosdagalera.pages.dev/logowpp.png" alt="Logo" class="logo-img" />
      <h1>Jogos da Galera</h1>
    </div>

    <div id="room-info" class="room-info hidden">
      <span>Sala: <strong id="room-code-val">-</strong></span>
      <span id="room-status">1 jogador conectado</span>
      <button class="btn-exit" onclick="exitRoom()">Sair</button>
    </div>
  </header>

  <main class="games-grid" id="games-list">
    </main>

  <script>
    const GAMES_DATA = [
      {
        id: "caraacara",
        title: "Cara a Cara",
        desc: "Adivinhe o personagem secreto do seu oponente antes que ele adivinhe o seu!",
        thumb: "https://caraacara.pages.dev/img/logowpp.jpg",
        url: "https://caraacara.pages.dev/"
      }
    ];

    /* ── CONFIGURAÇÕES INICIAIS DA SALA ─────────────────────── */
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room') ? urlParams.get('room').toUpperCase() : null;

    function loadGames() {
      const container = document.getElementById('games-list');
      container.innerHTML = "";

      GAMES_DATA.forEach(game => {
        let finalUrl = game.url;
        if (roomCode) {
          finalUrl += `?room=${roomCode}`;
        }

        const card = document.createElement('a');
        card.className = "game-card";
        card.href = finalUrl;

        card.innerHTML = `
          <img src="${game.thumb}" alt="${game.title}" class="game-thumb" />
          <div class="game-info">
            <div class="game-title">${game.title}</div>
            <div class="game-desc">${game.desc}</div>
          </div>
        `;
        container.appendChild(card);
      });

      if (roomCode) {
        document.getElementById('room-code-val').textContent = roomCode;
        document.getElementById('room-info').classList.remove('hidden');
      }
    }

    function exitRoom() {
      window.location.href = window.location.origin + window.location.pathname;
    }

    /* ── PRESENÇA EM SALA (PEERJS) ──────────────────────────── */
    let presencePeer = null;
    let isPresenceHost = false;
    let hostConnections = [];
    let guestConn = null;
    let reconnectTimer = null;

    function initPresenceHost(code) {
      destroyPresencePeer();
      presencePeer = new Peer('jogosdagalera-' + code);

      presencePeer.on('open', () => {
        isPresenceHost = true;
        updatePresenceUI(1);
      });

      presencePeer.on('connection', (conn) => {
        if (!hostConnections.some(c => c.peer === conn.peer)) {
          hostConnections.push(conn);
        }
        const totalPlayers = hostConnections.length + 1;
        updatePresenceUI(totalPlayers);
        broadcastCount(totalPlayers);

        conn.on('close', () => {
          hostConnections = hostConnections.filter(c => c.peer !== conn.peer);
          const currentPlayers = hostConnections.length + 1;
          updatePresenceUI(currentPlayers);
          broadcastCount(currentPlayers);
        });

        conn.on('error', () => {
          hostConnections = hostConnections.filter(c => c.peer !== conn.peer);
          const currentPlayers = hostConnections.length + 1;
          updatePresenceUI(currentPlayers);
          broadcastCount(currentPlayers);
        });
      });

      presencePeer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          // ID ocupado: O primeiro navegador já é o Host, então este vira Guest
          initPresenceGuest(code);
        } else {
          scheduleReconnect(code, 1500);
        }
      });
    }

    function initPresenceGuest(code) {
      destroyPresencePeer();
      // Instancia sem ID fixo para evitar conflitos
      presencePeer = new Peer();

      presencePeer.on('open', () => {
        isPresenceHost = false;
        guestConn = presencePeer.connect('jogosdagalera-' + code);

        guestConn.on('data', (data) => {
          if (data && data.type === 'COUNT') {
            updatePresenceUI(data.count);
          }
        });

        guestConn.on('close', () => {
          scheduleReconnect(code, 1500);
        });

        guestConn.on('error', () => {
          scheduleReconnect(code, 1500);
        });
      });

      presencePeer.on('error', (err) => {
        scheduleReconnect(code, 1500);
      });
    }

    function broadcastCount(count) {
      hostConnections.forEach(conn => {
        if (conn.open) {
          conn.send({ type: 'COUNT', count: count });
        }
      });
    }

    function updatePresenceUI(count) {
      const statusEl = document.getElementById('room-status');
      if (statusEl) {
        statusEl.textContent = `${count} ${count === 1 ? 'jogador conectado' : 'jogadores conectados'}`;
      }
    }

    function scheduleReconnect(code, delay) {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        if (roomCode) {
          initPresenceHost(roomCode);
        }
      }, delay);
    }

    function destroyPresencePeer() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      if (guestConn) { 
        try { guestConn.close(); } catch (e) {} 
        guestConn = null;
      }
      if (hostConnections && hostConnections.length > 0) {
        hostConnections.forEach(c => { try { c.close(); } catch (e) {} });
        hostConnections = [];
      }
      if (presencePeer) {
        try {
          presencePeer.off('open');
          presencePeer.off('connection');
          presencePeer.off('disconnected');
          presencePeer.off('close');
          presencePeer.off('error');
          presencePeer.destroy();
        } catch (e) {}
        presencePeer = null;
      }
      isPresenceHost = false;
    }

    if (roomCode) {
      initPresenceHost(roomCode);
    }

    window.addEventListener('beforeunload', () => {
      destroyPresencePeer();
    });

    /* ── INIT ───────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
      loadGames();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    });
  </script>
</body>
</html>
