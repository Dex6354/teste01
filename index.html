<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivinha a Coordenada P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 p-3 border-b-4 border-slate-700 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-extrabold text-sm tracking-wider uppercase text-amber-400">Quente ou Frio P2P</h1>
                <div class="text-[11px] text-slate-400 font-mono">Sala: <strong id="room-id" class="text-indigo-400">...</strong></div>
            </div>
            <button onclick="leaveRoom()" class="bg-slate-700 hover:bg-red-600 text-[11px] py-1 px-2 rounded">Sair</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-3 w-full max-w-md mx-auto mb-12">
        <div id="lobby" class="fixed inset-0 bg-slate-950/90 z-40 flex flex-col items-center justify-center p-6 text-center">
            <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl w-full max-w-sm">
                <h2 class="text-xl font-bold mb-2">Aguardando Rival</h2>
                <button onclick="copyLink()" class="bg-indigo-600 text-xs px-3 py-1.5 rounded font-bold">📋 Copiar Link</button>
            </div>
        </div>

        <div id="turn-indicator" class="w-full text-center font-bold py-2 rounded-xl text-xs bg-slate-800 mb-3 border border-slate-700">Conectando...</div>
        <div id="distance-feed" class="text-[11px] text-amber-400 font-mono mb-2 h-4 text-center">Clique no mapa para rastrear o tesouro.</div>

        <!-- MAPA TÁTIL 10x10 -->
        <div id="grid" class="grid grid-cols-10 gap-1 w-full aspect-square bg-slate-950 p-2 rounded-xl border-2 border-slate-800 shadow-2xl"></div>
    </main>

    <script>
        let peer = null, conn = null, myRole = '', roomCode = new URLSearchParams(window.location.search).get('room');
        let isMyTurn = false, size = 10, target = {x: 0, y: 0};

        if (!roomCode) {
            roomCode = 'GRID-' + Math.random().toString(36).substring(2, 7).toUpperCase();
            localStorage.setItem('host_grid', roomCode);
            window.location.href = window.location.origin + window.location.pathname + '?room=' + roomCode;
        } else {
            document.getElementById('room-id').innerText = roomCode;
            myRole = (roomCode === localStorage.getItem('host_grid')) ? 'red' : 'blue';
            setupPeer();
        }

        function setupPeer() {
            if (myRole === 'red') {
                peer = new Peer(roomCode);
                peer.on('connection', c => { conn = c; handleEvents(); });
            } else {
                peer = new Peer();
                peer.on('open', () => { conn = peer.connect(roomCode); handleEvents(); });
            }
        }

        function handleEvents() {
            conn.on('open', () => {
                document.getElementById('lobby').classList.add('hidden');
                if (myRole === 'red') {
                    target = { x: Math.floor(Math.random()*size), y: Math.floor(Math.random()*size) };
                    conn.send({ type: 'SYNC_TARGET', target: target });
                }
                isMyTurn = (myRole === 'red');
                buildGrid(); updateUI();
            });
            conn.on('data', data => {
                if (data.type === 'SYNC_TARGET') { target = data.target; }
                else if (data.type === 'CLICK') {
                    markCell(data.x, data.y, data.status, false);
                    isMyTurn = true; updateUI();
                } else if (data.type === 'WIN') {
                    alert('O oponente encontrou o tesouro! Fim de jogo.'); window.location.reload();
                }
            });
        }

        function buildGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            for(let y=0; y<size; y++) {
                for(let x=0; x<size; x++) {
                    grid.innerHTML += `<button id="cell-${x}-${y}" onclick="tileClick(${x},${y})" class="bg-slate-800 hover:bg-slate-700 aspect-square rounded transition font-mono text-[9px] text-slate-500 flex items-center justify-center"></button>`;
                }
            }
        }

        function tileClick(x, y) {
            if (!isMyTurn) return;
            const btn = document.getElementById(`cell-${x}-${y}`);
            if (btn.disabled) return;

            if (x === target.x && y === target.y) {
                btn.className = "bg-green-500 text-white aspect-square rounded font-bold text-center";
                btn.innerText = "🏆";
                conn.send({ type: 'WIN' });
                alert('Parabéns! Você achou o tesouro!'); window.location.reload();
                return;
            }

            const dist = Math.hypot(x - target.x, y - target.y);
            let status = 'Frio';
            if (dist <= 1.5) status = 'Fogo!';
            else if (dist <= 3) status = 'Quente';
            else if (dist <= 5) status = 'Morno';

            markCell(x, y, status, true);
            isMyTurn = false; updateUI();
            conn.send({ type: 'CLICK', x: x, y: y, status: status });
        }

        function markCell(x, y, status, isLocal) {
            const btn = document.getElementById(`cell-${x}-${y}`);
            btn.disabled = true;
            btn.innerText = status[0];
            if (status === 'Fogo!') btn.className = "bg-rose-600 text-white font-bold aspect-square rounded";
            else if (status === 'Quente') btn.className = "bg-orange-500 text-slate-900 font-bold aspect-square rounded";
            else if (status === 'Morno') btn.className = "bg-amber-400 text-slate-900 font-bold aspect-square rounded";
            else btn.className = "bg-slate-950 text-slate-600 aspect-square rounded";
            
            document.getElementById('distance-feed').innerText = `${isLocal ? 'Seu tiro' : 'Tiro do rival'} em (${x},${y}) deu: ${status}`;
        }

        function updateUI() {
            const ind = document.getElementById('turn-indicator');
            ind.innerText = isMyTurn ? "🟢 SEU TURNO" : "⏳ VEZ DO ADVERSÁRIO";
            ind.className = isMyTurn ? "w-full text-center font-black py-2 rounded-xl text-xs bg-emerald-950 text-emerald-400 border border-emerald-800" : "w-full text-center font-bold py-2 rounded-xl text-xs bg-slate-800 text-slate-500 border border-slate-700";
        }

        function copyLink() { navigator.clipboard.writeText(window.location.href).then(() => alert('Link copiado!')); }
        function leaveRoom() { localStorage.clear(); window.location.href = window.location.origin + window.location.pathname; }
    </script>
</body>
</html>
