<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360, initial-scale=1, maximum-scale=5, user-scalable=1" />
  <title>Jogos da Galera</title>

  <link rel="icon"     type="image/png" href="https://jogosdagalera.pages.dev/logowpp.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color"       content="#f1c40f">
  <meta property="og:title"       content="Jogos da Galera">
  <meta property="og:description" content="Seus jogos favoritos">
  <meta property="og:image"       content="https://jogosdagalera.pages.dev/logowpp.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ... (todos os estilos originais mantidos) ... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:      #f1c40f;
      --yellow-dark: #f39c12;
      --yellow-glow: rgba(241, 196, 15, 0.18);
      --bg:          #0f1923;
      --bg-card:     #162230;
      --bg-card-hov: #1c2d3f;
      --bg-input:    #1a2635;
      --border:      rgba(255, 255, 255, 0.07);
      --text:        #e8edf2;
      --text-muted:  #7a92a8;
      --tag-bg:      rgba(241, 196, 15, 0.13);
      --radius-card: 14px;
      --font:        'Nunito', sans-serif;
    }

    /* Estilos da seção de sala (iguais ao Cara a Cara) */
    #room-section {
      background: #0c151e;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 16px 24px;
    }

    @media (max-width: 560px) {
      #room-section { padding: 14px 14px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <div class="logo-badge">
      <img src="https://jogosdagalera.pages.dev/logo3.png" alt="Jogos da Galera">
    </div>
  </a>
  <div>
    <a class="nav-lang" href="/">🏠 Home</a>
  </div>
</nav>

<!-- === NOVA SEÇÃO DE SALA (logo abaixo do header) === -->
<div id="room-section">
  <div class="max-w-md mx-auto">
    <div class="flex justify-between items-center bg-slate-900 border border-slate-700 rounded-2xl p-4 shadow-xl">
      <div>
        <span class="text-xs text-slate-400">Sala Cara a Cara</span>
        <div class="flex items-center gap-2 mt-1">
          <strong id="room-id" class="text-2xl font-mono tracking-widest text-indigo-400">CARA-XXXXX</strong>
        </div>
      </div>

      <div class="flex flex-col items-end gap-2">
        <button onclick="copyRoomLink()" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-xl text-sm font-bold flex items-center gap-1 transition">
          📋 Compartilhar
        </button>
        <button onclick="newRoom()" 
                class="bg-slate-700 hover:bg-red-600 text-white px-4 py-1.5 rounded-xl text-sm font-bold flex items-center gap-1 transition">
          🚪 Nova Sala
        </button>
      </div>
    </div>

    <div class="text-center mt-3">
      <span id="online-count" class="text-emerald-400 text-sm font-medium flex items-center justify-center gap-1">
        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        1 jogador online
      </span>
    </div>
  </div>
</div>

<header class="hero">
  <h1>Jogue <span>Grátis</span> com Amigos</h1>
  <p>Jogos multiplayer no navegador, sem cadastro. Convide amigos e jogue agora!</p>
  <div class="hero-badges">
    <span class="badge">✅ Sem Cadastro</span>
    <span class="badge">🎮 Multiplayer</span>
    <span class="badge">📥 Sem Download</span>
    <span class="badge">🆓 100% Grátis</span>
  </div>
</header>

<!-- resto do conteúdo original (filters, search, grid, etc.) -->
<div class="filters"> ... </div>
<!-- ... -->

<script>
// Geração automática de sala
let currentRoomCode = '';

function generateRoomCode() {
  currentRoomCode = 'CARA-' + Math.random().toString(36).substring(2, 7).toUpperCase();
  document.getElementById('room-id').textContent = currentRoomCode;
}

function copyRoomLink() {
  const link = window.location.origin + '/caraacara.html?room=' + currentRoomCode;
  navigator.clipboard.writeText(link).then(() => {
    alert('✅ Link da sala copiado!');
  });
}

function newRoom() {
  generateRoomCode();
  // Opcional: atualizar contador online
  updateOnlineCount(1);
}

function updateOnlineCount(count) {
  const el = document.getElementById('online-count');
  el.innerHTML = `
    <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
    ${count} jogador${count > 1 ? 'es' : ''} online
  `;
}

// Inicialização
document.addEventListener('DOMContentLoaded', () => {
  generateRoomCode();
  updateOnlineCount(1); // começa com 1 (você)
  
  // ... resto do seu script original
  loadGames();
});
</script>

</body>
</html>
