<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Versus P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 p-3 border-b-4 border-slate-700 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-extrabold text-sm tracking-wider uppercase text-amber-400">Snake Versus</h1>
                <div class="text-[11px] text-slate-400 font-mono">Sala: <strong id="room-id" class="text-indigo-400">...</strong></div>
            </div>
            <button onclick="leaveRoom()" class="bg-slate-700 hover:bg-red-600 text-[11px] py-1 px-2 rounded">Sair</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-3 w-full max-w-md mx-auto mb-12">
        <div id="lobby" class="fixed inset-0 bg-slate-950/90 z-40 flex flex-col items-center justify-center p-6 text-center">
            <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl w-full max-w-sm">
                <h2 class="text-xl font-bold mb-2">Aguardando Adversário</h2>
                <button onclick="copyLink()" class="bg-indigo-600 text-xs px-3 py-1.5 rounded font-bold">📋 Copiar Link de Convite</button>
            </div>
        </div>

        <div id="turn-indicator" class="w-full text-center font-bold py-2 rounded-xl text-xs bg-slate-800 mb-3 border border-slate-700">Carregando...</div>

        <!-- TABULEIRO SNEAK -->
        <div id="board" class="grid grid-cols-12 gap-1 w-full aspect-square bg-slate-950 p-2 rounded-xl border-2 border-slate-800 shadow-2xl"></div>

        <!-- CONTROLES MOBILE -->
        <div class="grid grid-cols-3 gap-2 w-full max-w-[200px] mx-auto mt-4 text-center">
            <div></div><button onclick="move('UP')" class="bg-slate-800 border border-slate-700 p-3 rounded-xl font-bold">▲</button><div></div>
            <button onclick="move('LEFT')" class="bg-slate-800 border border-slate-700 p-3 rounded-xl font-bold">◀</button>
            <div class="bg-slate-900 flex items-center justify-center text-[10px] font-mono text-slate-500">Mover</div>
            <button onclick="move('RIGHT')" class="bg-slate-800 border border-slate-700 p-3 rounded-xl font-bold">▶</button>
            <div></div><button onclick="move('DOWN')" class="bg-slate-800 border border-slate-700 p-3 rounded-xl font-bold">▼</button><div></div>
        </div>
    </main>

    <script>
        let peer = null, conn = null, myRole = '', roomCode = new URLSearchParams(window.location.search).get('room');
        let isMyTurn = false, size = 12;
        let p1 = [{x:2, y:6}], p2 = [{x:9, y:6}], apple = {x:6, y:6};

        if (!roomCode) {
            roomCode = 'SNAKE-' + Math.random().toString(36).substring(2, 7).toUpperCase();
            localStorage.setItem('host_snake', roomCode);
            window.location.href = window.location.origin + window.location.pathname + '?room=' + roomCode;
        } else {
            document.getElementById('room-id').innerText = roomCode;
            myRole = (roomCode === localStorage.getItem('host_snake')) ? 'red' : 'blue';
            setupPeer();
        }

        function setupPeer() {
            if (myRole === 'red') {
                peer = new Peer(roomCode);
                peer.on('connection', c => { conn = c; handleEvents(); });
            } else {
                peer = new Peer();
                peer.on('open', () => { conn = peer.connect(roomCode); handleEvents(); });
            }
        }

        function handleEvents() {
            conn.on('open', () => { document.getElementById('lobby').classList.add('hidden'); isMyTurn = (myRole === 'red'); render(); updateUI(); });
            conn.on('data', data => {
                if (data.type === 'MOVE') {
                    p1 = data.p1; p2 = data.p2; apple = data.apple;
                    if (data.lost) { alert(data.lost === myRole ? 'Você Perdeu!' : 'Você Ganhou!'); window.location.reload(); return; }
                    isMyTurn = true; render(); updateUI();
                }
            });
        }

        function render() {
            const board = document.getElementById('board'); board.innerHTML = '';
            for(let y=0; y<size; y++) {
                for(let x=0; x<size; x++) {
                    let c = "bg-slate-900/40 rounded-sm";
                    if (p1.some(b => b.x===x && b.y===y)) c = "bg-red-500 rounded-sm shadow-md shadow-red-500/20";
                    else if (p2.some(b => b.x===x && b.y===y)) c = "bg-blue-500 rounded-sm shadow-md shadow-blue-500/20";
                    else if (apple.x===x && apple.y===y) c = "bg-amber-400 animate-pulse rounded-full";
                    board.innerHTML += `<div class="${c} aspect-square"></div>`;
                }
            }
        }

        function updateUI() {
            const ind = document.getElementById('turn-indicator');
            ind.innerText = isMyTurn ? "🟢 SEU TURNO! Faça sua jogada" : "⏳ VEZ DO RIVAL... Aguarde";
            ind.className = isMyTurn ? "w-full text-center font-black py-2 rounded-xl text-xs bg-emerald-950 text-emerald-400 border border-emerald-800" : "w-full text-center font-bold py-2 rounded-xl text-xs bg-slate-800 text-slate-500 border border-slate-700";
        }

        function move(dir) {
            if (!isMyTurn) return;
            let head = Object.assign({}, myRole === 'red' ? p1[0] : p2[0]);
            if (dir === 'UP') head.y--; if (dir === 'DOWN') head.y++;
            if (dir === 'LEFT') head.x--; if (dir === 'RIGHT') head.x++;

            let currentSnake = myRole === 'red' ? p1 : p2;
            currentSnake.unshift(head);

            if (head.x === apple.x && head.y === apple.y) {
                apple = { x: Math.floor(Math.random()*size), y: Math.floor(Math.random()*size) };
            } else {
                currentSnake.pop();
            }

            let lost = null;
            if (head.x<0 || head.x>=size || head.y<0 || head.y>=size || p1.slice(1).some(b=>b.x===head.x && b.y===head.y) || p2.slice(1).some(b=>b.x===head.x && b.y===head.y)) {
                lost = myRole;
            }

            isMyTurn = false; render(); updateUI();
            conn.send({ type: 'MOVE', p1: p1, p2: p2, apple: apple, lost: lost });
            if (lost) { alert('Você bateu e perdeu!'); window.location.reload(); }
        }

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') move('UP'); if(e.key === 'ArrowDown') move('DOWN');
            if(e.key === 'ArrowLeft') move('LEFT'); if(e.key === 'ArrowRight') move('RIGHT');
        });

        function copyLink() { navigator.clipboard.writeText(window.location.href).then(() => alert('Link copiado!')); }
        function leaveRoom() { localStorage.clear(); window.location.href = window.location.origin + window.location.pathname; }
    </script>
</body>
</html>
