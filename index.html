<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Trunfo P2P Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between select-none">

    <header id="topbar" class="bg-slate-800 p-3 border-b-4 border-slate-700 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="font-extrabold text-base tracking-wider text-amber-500">🏎️ SUPER TRUNFO</h1>
                <div class="flex items-center space-x-1.5 text-[11px] text-slate-400 font-mono mt-0.5">
                    <span>Sala:<strong id="topbar-room-id" class="text-indigo-400">...</strong></span>
                    <button onclick="copyLink()" class="bg-slate-700 hover:bg-indigo-600 text-white px-2 py-0.5 rounded text-[10px] font-bold transition">📋 Copiar</button>
                </div>
            </div>
            <button onclick="leaveRoom()" class="bg-slate-700 hover:bg-red-600 text-[11px] font-bold py-1 px-2.5 rounded-lg transition">➡️ Sair</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-start p-3 w-full max-w-md mx-auto mb-12 space-y-3">
        
        <div id="screen-lobby" class="fixed inset-0 bg-slate-950/80 z-40 flex flex-col items-center justify-center p-6 text-center">
            <div class="bg-slate-900 border-2 border-slate-700 p-6 rounded-2xl max-w-sm w-full shadow-2xl space-y-4">
                <h2 class="text-xl font-extrabold">Aguardando Desafiante</h2>
                <p class="text-slate-400 text-xs">Compartilhe o link para disputar quem tem as melhores cartas!</p>
                <div id="connection-status" class="text-amber-400 text-xs font-medium animate-pulse">Conectando...</div>
            </div>
        </div>

        <div class="w-full bg-slate-800 p-2.5 rounded-xl border border-slate-700 shadow-xl flex items-center justify-between text-center text-xs">
            <div class="flex-1">
                <span class="font-bold text-emerald-400 block">Suas Cartas</span>
                <span id="cards-me" class="text-xl font-mono font-black">0</span>
            </div>
            <div class="px-3 border-x border-slate-700 min-w-[130px] flex flex-col items-center justify-center">
                <span id="turn-text" class="font-black text-amber-400 uppercase tracking-wider text-[11px]">Carregando...</span>
                <span id="round-log" class="text-[9px] text-slate-300 mt-0.5 block truncate max-w-[120px]">Preparando baralho</span>
            </div>
            <div class="flex-1">
                <span class="font-bold text-blue-400 block">Oponente</span>
                <span id="cards-opp" class="text-xl font-mono font-black">0</span>
            </div>
        </div>

        <div id="screen-game" class="w-full hidden flex flex-col space-y-4">
            
            <div class="grid grid-cols-2 gap-3 items-start">
                
                <div class="bg-gradient-to-b from-slate-800 to-slate-850 rounded-2xl border-2 border-emerald-500 shadow-xl overflow-hidden p-2 flex flex-col space-y-2 relative">
                    <div class="bg-emerald-600 text-center py-1 rounded-lg">
                        <span id="card-me-name" class="text-xs font-black tracking-wide block truncate">---</span>
                    </div>
                    <div class="bg-slate-950/80 rounded-xl aspect-[4/3] flex items-center justify-center text-3xl shadow-inner border border-slate-800">🏎️</div>
                    
                    <div id="attrs-container-me" class="space-y-1 text-[11px]">
                        </div>
                </div>

                <div id="card-opponent" class="bg-gradient-to-b from-slate-800 to-slate-850 rounded-2xl border-2 border-slate-700 shadow-xl overflow-hidden p-2 flex flex-col space-y-2 relative min-h-[220px]">
                    <div id="card-opp-back" class="absolute inset-0 bg-indigo-950 flex flex-col items-center justify-center p-4 text-center z-10 rounded-2xl border-2 border-slate-700">
                        <span class="text-3xl animate-bounce mb-1">🎴</span>
                        <span class="text-[10px] font-bold text-indigo-300 uppercase tracking-wider">Carta do Oponente</span>
                    </div>

                    <div class="bg-blue-600 text-center py-1 rounded-lg">
                        <span id="card-opp-name" class="text-xs font-black tracking-wide block truncate">---</span>
                    </div>
                    <div class="bg-slate-950/80 rounded-xl aspect-[4/3] flex items-center justify-center text-3xl border border-slate-800">🏎️</div>
                    
                    <div id="attrs-container-opp" class="space-y-1 text-[11px] pointer-events-none">
                        </div>
                </div>

            </div>

            <button id="btn-next-round" onclick="advanceNextRound()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-xl text-xs uppercase tracking-wider shadow-lg transition hidden">
                Próxima Rodada ➡️
            </button>

        </div>

        <div id="screen-game-over" class="w-full bg-slate-800 p-6 rounded-2xl border-2 border-amber-500 text-center space-y-4 hidden">
            <h2 id="game-over-title" class="text-3xl font-black text-green-400">🏆 VITÓRIA!</h2>
            <p id="game-over-msg" class="text-sm text-slate-300">Você conquistou todo o baralho!</p>
            <button onclick="window.location.reload()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider shadow-lg transition">
                🔄 Jogar Novamente
            </button>
        </div>

    </main>

    <script>
        let peer = null, conn = null, myRole = '', roomCode = '';
        let myDeck = [], oppCardCount = 0;
        let isMyTurn = false;
        
        // Estado temporário da rodada para revelação
        let currentRoundChosenAttr = null;
        let localTopCard = null;
        let receivedOppCard = null;

        const baseDeck = [
            { name: "Bugatti Chiron", vel: 420, pot: 1500, acc: 2.4, price: 3000000 },
            { name: "Koenigsegg Jesko", vel: 480, pot: 1600, acc: 2.5, price: 2800000 },
            { name: "Ferrari SF90", vel: 340, pot: 1000, acc: 2.5, price: 500000 },
            { name: "Tesla Model S Plaid", vel: 322, pot: 1020, acc: 2.1, price: 130000 },
            { name: "McLaren 765LT", vel: 330, pot: 765, acc: 2.8, price: 380000 },
            { name: "Porsche 911 Turbo S", vel: 330, pot: 650, acc: 2.7, price: 220000 },
            { name: "Lamborghini Revuelto", vel: 350, pot: 1015, acc: 2.5, price: 600000 },
            { name: "Aston Martin Valkyrie", vel: 355, pot: 1160, acc: 2.6, price: 3500000 },
            { name: "Pagani Huayra R", vel: 380, pot: 850, acc: 2.8, price: 3100000 },
            { name: "Nissan GT-R Nismo", vel: 315, pot: 600, acc: 2.8, price: 210000 },
            { name: "Audi R8 V10 Performance", vel: 331, pot: 620, acc: 3.1, price: 170000 },
            { name: "Chevrolet Corvette Z06", vel: 312, pot: 670, acc: 2.6, price: 110000 }
        ];

        const attrNames = {
            vel: { label: "Vel. Máxima", unit: "km/h", lowWins: false },
            pot: { label: "Potência", unit: "cv", lowWins: false },
            acc: { label: "0-100 km/h", unit: "s", lowWins: true }, // Atenção: Menor tempo ganha!
            price: { label: "Preço", unit: "$", lowWins: false }
        };

        const urlParams = new URLSearchParams(window.location.search);
        roomCode = urlParams.get('room');

        if (!roomCode) {
            const generatedCode = 'TRUNFO-' + Math.random().toString(36).substring(2, 7).toUpperCase();
            localStorage.setItem('hosted_trunfo_room', generatedCode);
            window.location.href = window.location.origin + window.location.pathname + '?room=' + generatedCode;
        } else {
            document.getElementById('topbar-room-id').innerText = roomCode;
            myRole = (roomCode === localStorage.getItem('hosted_trunfo_room')) ? 'red' : 'blue';
            if (myRole === 'red') initHost(roomCode); else initGuest(roomCode);
        }

        function initHost(code) {
            peer = new Peer(code);
            peer.on('open', () => document.getElementById('connection-status').innerText = "Aguardando Oponente...");
            peer.on('connection', (connection) => { conn = connection; handleEvents(); });
        }

        function initGuest(code) {
            peer = new Peer();
            peer.on('open', () => {
                document.getElementById('connection-status').innerText = "Conectando ao Host...";
                conn = peer.connect(code);
                handleEvents();
            });
        }

        function handleEvents() {
            conn.on('open', () => {
                document.getElementById('screen-lobby').classList.add('hidden');
                document.getElementById('screen-game').classList.remove('hidden');
                if (myRole === 'red') setupNewGame();
            });

            conn.on('data', (data) => {
                if (data.type === 'START_GAME') {
                    myDeck = data.guestDeck;
                    oppCardCount = data.hostCardCount;
                    isMyTurn = data.yourTurn;
                    updateUI();
                } else if (data.type === 'PICK_ATTR') {
                    currentRoundChosenAttr = data.attr;
                    receivedOppCard = data.card;
                    resolveBattle();
                } else if (data.type === 'REPLY_CARD') {
                    receivedOppCard = data.card;
                    resolveBattle();
                }
            });
        }

        function setupNewGame() {
            let deck = [...baseDeck].sort(() => Math.random() - 0.5);
            myDeck = deck.splice(0, 6);
            let guestDeck = deck; 

            isMyTurn = true;
            oppCardCount = guestDeck.length;

            conn.send({
                type: 'START_GAME',
                guestDeck: guestDeck,
                hostCardCount: myDeck.length,
                yourTurn: false
            });

            updateUI();
        }

        function updateUI() {
            document.getElementById('cards-me').innerText = myDeck.length;
            document.getElementById('cards-opp').innerText = oppCardCount;

            const turnText = document.getElementById('turn-text');
            if (isMyTurn) {
                turnText.innerText = "Sua Vez!";
                turnText.className = "font-black text-emerald-400 uppercase tracking-wider text-[11px] animate-pulse";
                document.getElementById('round-log').innerText = "Escolha um atributo";
            } else {
                turnText.innerText = "Oponente...";
                turnText.className = "font-black text-slate-400 uppercase tracking-wider text-[11px]";
                document.getElementById('round-log').innerText = "Aguardando escolha";
            }

            // Oculta visualmente a carta do oponente
            document.getElementById('card-opp-back').classList.remove('hidden');
            document.getElementById('btn-next-round').classList.add('hidden');

            if (myDeck.length > 0) {
                localTopCard = myDeck[0];
                renderLocalCard();
            }
        }

        function renderLocalCard() {
            document.getElementById('card-me-name').innerText = localTopCard.name;
            const container = document.getElementById('attrs-container-me');
            container.innerHTML = '';

            Object.keys(attrNames).forEach(key => {
                const attr = attrNames[key];
                const btn = document.createElement('button');
                btn.disabled = !isMyTurn;
                btn.className = `w-full flex justify-between items-center p-2 rounded-lg font-mono transition text-left border ${isMyTurn ? 'bg-slate-800 border-slate-700 hover:bg-emerald-950 hover:border-emerald-500' : 'bg-slate-800/50 border-slate-800'}`;
                
                btn.innerHTML = `
                    <span class="text-slate-400 font-sans">${attr.label}:</span>
                    <span class="font-bold text-white">${localTopCard[key]}${attr.unit}</span>
                `;

                btn.onclick = () => selectAttribute(key);
                container.appendChild(btn);
            });
        }

        function selectAttribute(key) {
            if (!isMyTurn) return;
            currentRoundChosenAttr = key;

            // Desabilita cliques extras imediatos travando a interface
            isMyTurn = false;
            document.getElementById('turn-text').innerText = "Analisando...";

            conn.send({
                type: 'PICK_ATTR',
                attr: key,
                card: localTopCard
            });
        }

        function resolveBattle() {
            // Se eu escolhi o atributo, avisei o oponente e ele me respondeu com a carta dele via REPLY_CARD.
            // Se o oponente escolheu o atributo, ele me mandou PICK_ATTR contendo o atributo e a carta dele.
            if (myRole !== roomCode && receivedOppCard && !isMyTurn && myDeck.length > 0 && !document.getElementById('btn-next-round').classList.contains('hidden')) {
                // Prevenção de loop ou chamadas duplicadas tardias
            }

            // Se fui eu que escolhi e ainda não recebi a resposta do oponente, solicito a carta dele
            if (!receivedOppCard) {
                conn.send({
                    type: 'REPLY_CARD',
                    card: localTopCard
                });
                return;
            }

            // Mostrar a carta do oponente na tela
            document.getElementById('card-opp-back').classList.add('hidden');
            document.getElementById('card-opp-name').innerText = receivedOppCard.name;
            
            const containerOpp = document.getElementById('attrs-container-opp');
            containerOpp.innerHTML = '';

            Object.keys(attrNames).forEach(key => {
                const attr = attrNames[key];
                const isTarget = (key === currentRoundChosenAttr);
                const div = document.createElement('div');
                div.className = `w-full flex justify-between items-center p-2 rounded-lg font-mono border ${isTarget ? 'bg-indigo-950 border-indigo-500 font-bold ring-1 ring-indigo-400' : 'bg-slate-800/40 border-slate-800/80'}`;
                div.innerHTML = `
                    <span class="text-slate-400 font-sans">${attr.label}:</span>
                    <span class="text-white">${receivedOppCard[key]}${attr.unit}</span>
                `;
                containerOpp.appendChild(div);
            });

            // Lógica de Comparação
            const config = attrNames[currentRoundChosenAttr];
            let myValue = localTopCard[currentRoundChosenAttr];
            let oppValue = receivedOppCard[currentRoundChosenAttr];

            let iWon = false;
            let tie = false;

            if (myValue === oppValue) {
                tie = true;
            } else if (config.lowWins) {
                iWon = (myValue < oppValue);
            } else {
                iWon = (myValue > oppValue);
            }

            // Remover do topo
            myDeck.shift();

            if (tie) {
                document.getElementById('round-log').innerText = "Empate!";
                // Volta para o fundo do próprio deck
                myDeck.push(localTopCard);
            } else if (iWon) {
                document.getElementById('round-log').innerText = "Você Venceu!";
                myDeck.push(localTopCard);
                myDeck.push(receivedOppCard);
                isMyTurn = true; // Mantém ou ganha o turno
            } else {
                document.getElementById('round-log').innerText = "Você Perdeu!";
                isMyTurn = false;
            }

            oppCardCount = baseDeck.length - myDeck.length; // Ajusta contagem baseada no baralho global estável
            if (tie) oppCardCount = baseDeck.length / 2; // Correção aproximada rápida visual se empatar antes de syncs completos

            // Exibir botão de avançar de fase de forma limpa
            document.getElementById('btn-next-round').classList.remove('hidden');
        }

        function advanceNextRound() {
            receivedOppCard = null;
            currentRoundChosenAttr = null;

            if (myDeck.length === 0 || myDeck.length === baseDeck.length) {
                checkGameOver();
            } else {
                updateUI();
            }
        }

        function checkGameOver() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-game-over').classList.remove('hidden');

            const title = document.getElementById('game-over-title');
            const msg = document.getElementById('game-over-msg');

            if (myDeck.length === baseDeck.length) {
                title.innerText = "🏆 VITÓRIA!";
                title.className = "text-3xl font-black text-green-400";
                msg.innerText = "Incrível! Você tomou todas as cartas do oponente.";
            } else {
                title.innerText = "💀 DERROTA!";
                title.className = "text-3xl font-black text-red-500";
                msg.innerText = "Você ficou sem cartas no baralho.";
            }
        }

        function copyLink() {
            const shareLink = window.location.origin + window.location.pathname + '?room=' + roomCode;
            navigator.clipboard.writeText(shareLink).then(() => alert('Link copiado!'));
        }

        function leaveRoom() {
            localStorage.removeItem('hosted_trunfo_room');
            if (conn) conn.close();
            if (peer) peer.destroy();
            window.location.href = window.location.origin + window.location.pathname;
        }

        window.addEventListener('beforeunload', () => {
            if (conn) conn.close();
            if (peer) peer.destroy();
        });
    </script>
</body>
</html>
